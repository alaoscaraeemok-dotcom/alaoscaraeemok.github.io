<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Canal Oficial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="decor-flower flower-1"></div>
        <div class="decor-flower flower-2"></div>
        <div class="decor-flower flower-3"></div>

        <div class="login-card">
            <div class="login-header">
                <h2>ACESSO AO DASHBOARD</h2>
                <p>Entre para gerenciar seu conteúdo e vídeos</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usuario" placeholder="Digite seu usuário" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn btn-primary">ENTRAR</button>
                <p id="erro" class="erro-msg"></p>
            </form>
        </div>
    </div>

    <script>
        const usuarioCorreto = "admin";
        const senhaCorreta = "123456";

        const form = document.getElementById("loginForm");
        form.addEventListener("submit", e => {
            e.preventDefault();
            const user = document.getElementById("usuario").value;
            const pass = document.getElementById("senha").value;

            if (user === usuarioCorreto && pass === senhaCorreta) {
                localStorage.setItem("logado", "true");
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("erro").textContent = "Usuário ou senha inválidos";
            }
        });
    </script>
</body>
</html>

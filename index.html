<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Canal Oficial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Elementos decorativos sutis -->
    <div class="bg-flower flower-top-left"></div>
    <div class="bg-flower flower-bottom-right"></div>
    <div class="bg-flower flower-center-left"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>ACESSO EXCLUSIVO</h1>
                <p>Entre para gerenciar todo o conteúdo do seu canal</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usuario" placeholder="Digite seu nome de usuário" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">ENTRAR</button>
                <p id="erroMsg" class="erro-mensagem"></p>
            </form>
        </div>
    </div>

    <script>
        const usuarioCorreto = "admin";
        const senhaCorreta = "123456";

        const form = document.getElementById("loginForm");
        form.addEventListener("submit", e => {
            e.preventDefault();
            const user = document.getElementById("usuario").value.trim();
            const pass = document.getElementById("senha").value.trim();

            if (user === usuarioCorreto && pass === senhaCorreta) {
                localStorage.setItem("logado", "true");
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("erroMsg").textContent = "Usuário ou senha incorretos";
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Meu Canal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pagina-login">
        <div class="caixa-login">
            <h2>🔒 Acesso Exclusivo</h2>
            <p class="subtitulo">Entre para conferir tudo sobre o nosso canal</p>
            
            <form id="loginForm">
                <div class="grupo-campo">
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usuario" required placeholder="Digite seu nome de usuário">
                </div>

                <div class="grupo-campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required placeholder="Digite sua senha">
                </div>

                <button type="submit" class="btn btn-principal">Entrar</button>
                <p id="mensagemErro" class="mensagem-erro"></p>
            </form>
        </div>
    </div>

    <script>
        const usuarioCorreto = "admin";
        const senhaCorreta = "123456";

        const form = document.getElementById('loginForm');
        const mensagemErro = document.getElementById('mensagemErro');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const usuarioDigitado = document.getElementById('usuario').value;
            const senhaDigitada = document.getElementById('senha').value;

            if (usuarioDigitado === usuarioCorreto && senhaDigitada === senhaCorreta) {
                localStorage.setItem('logado', "true");
                window.location.href = "menu.html";
            } else {
                mensagemErro.textContent = "Usuário ou senha incorretos. Tente novamente.";
            }
        });
    </script>
</body>
</html>

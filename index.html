<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Meu Canal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>Acesso ao Sistema</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="usuario">Usuário:</label>
                <input type="text" id="usuario" required placeholder="Digite seu usuário">
            </div>
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" required placeholder="Digite sua senha">
            </div>
            <button type="submit" class="btn">Entrar</button>
        </form>
        <p id="mensagemErro" class="erro"></p>
    </div>

    <script>
        // Dados de acesso (você pode alterar esses valores)
        const usuarioCorreto = "admin";
        const senhaCorreta = "123456";

        const form = document.getElementById('loginForm');
        const mensagemErro = document.getElementById('mensagemErro');

        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Impede o recarregamento da página

            const usuarioDigitado = document.getElementById('usuario').value;
            const senhaDigitada = document.getElementById('senha').value;

            if (usuarioDigitado === usuarioCorreto && senhaDigitada === senhaCorreta) {
                // Salva o status de login no navegador
                localStorage.setItem('logado', "true");
                // Redireciona para o menu principal
                window.location.href = "menu.html";
            } else {
                mensagemErro.textContent = "Usuário ou senha incorretos!";
            }
        });
    </script>
</body>
</html>

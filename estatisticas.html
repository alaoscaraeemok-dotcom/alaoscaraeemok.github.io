<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas | Sistema de Vídeos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        preto: { 900: '#000000', 800: '#050505', 700: '#0F0F0F', 600: '#1A1A1A', 500: '#242424' },
                        roxo: { 900: '#2D0C5E', 800: '#4B0082', 700: '#5A189A', 600: '#7B2CBF', 500: '#9D4EDD', 400: '#C77DFF' }
                    },
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
            .bg-gradient-roxo { background: linear-gradient(135deg, #000000 0%, #4B0082 100%); }
            .bordas-roxas { border: 1px solid rgba(157, 78, 221, 0.15); }
            .card-estatistica { @apply bg-preto-700/70 backdrop-blur-sm rounded-2xl bordas-roxas p-8 sombra-hover; }
            .sombra-hover { box-shadow: 0 8px 25px rgba(123, 44, 191, 0.15); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js"></script>
</head>
<body class="bg-preto-800 font-inter text-white min-h-screen relative overflow-hidden">

    <div class="absolute w-[600px] h-[600px] opacity-[0.03] -top-32 -right-32 rounded-full bg-roxo-500 blur-3xl"></div>
    <div class="absolute w-[600px] h-[600px] opacity-[0.03] -bottom-32 -left-32 rounded-full bg-roxo-500 blur-3xl"></div>

    <header class="sticky top-0 z-50 bg-gradient-roxo shadow-[0_4px_20px_rgba(0,0,0,0.4)] border-b border-roxo-700/20">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-roxo-500/20 flex items-center justify-center">
                    <i class="fa fa-bar-chart text-roxo-400 text-lg"></i>
                </div>
                <h2 class="text-[20px] font-bold tracking-wider text-shadow">ESTATÍSTICAS DO SISTEMA</h2>
            </div>
            <div class="flex gap-3">
                <a href="menu.html" class="border border-roxo-400/40 text-roxo-300 hover:bg-roxo-700/20 px-4 py-2 rounded-lg text-sm font-medium transition-all">Voltar ao Menu</a>
                <button id="btnSair" class="bg-red-900/60 hover:bg-red-800/80 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all">Sair</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 relative z-10">

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <!-- Total Vídeos -->
            <div class="card-estatistica text-center">
                <i class="fa fa-film text-roxo-400 text-4xl mb-3"></i>
                <h3 class="text-gray-400 text-sm">Total de Vídeos</h3>
                <p id="totalVideos" class="text-4xl font-bold text-white mt-2">0</p>
            </div>

            <!-- Total Categorias -->
            <div class="card-estatistica text-center">
                <i class="fa fa-th-large text-roxo-400 text-4xl mb-3"></i>
                <h3 class="text-gray-400 text-sm">Total de Categorias</h3>
                <p id="totalCategorias" class="text-4xl font-bold

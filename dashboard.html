<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Sistema de Vídeos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        preto: {
                            900: '#000000', 800: '#050505', 700: '#0F0F0F', 600: '#1A1A1A', 500: '#242424',
                        },
                        roxo: {
                            900: '#2D0C5E', 800: '#4B0082', 700: '#5A189A', 600: '#7B2CBF', 500: '#9D4EDD', 400: '#C77DFF',
                        }
                    },
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
            .bg-gradient-roxo { background: linear-gradient(135deg, #000000 0%, #4B0082 100%); }
            .bg-gradient-card { background: linear-gradient(145deg, #1A1A1A 0%, #0F0F0F 100%); }
            .bordas-roxas { border: 1px solid rgba(157, 78, 221, 0.15); }
            .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
            .scrollbar-hide::-webkit-scrollbar { display: none; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-preto-800 font-inter text-white min-h-screen relative overflow-x-hidden">

    <!-- Elementos Decorativos -->
    <div class="absolute w-[450px] h-[450px] opacity-[0.02] top-0 right-0" style="background: url('https://cdn-icons-png.flaticon.com/512/1296/1296888.png') no-repeat center/contain;"></div>
    <div class="absolute w-[450px] h-[450px] opacity-[0.02] bottom-0 left-0" style="background: url('https://cdn-icons-png.flaticon.com/512/3162/3162338.png') no-repeat center/contain;"></div>

    <!-- Barra Superior -->
    <header class="sticky top-0 z-50 bg-gradient-roxo shadow-[0_4px_20px_rgba(0,0,0,0.4)] border-b border-roxo-700/20">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h2 class="text-[20px] font-bold tracking-wider text-shadow">PAINEL DE GERENCIAMENTO</h2>
            <div class="flex gap-3">
                <a href="menu.html" class="border border-roxo-400/40 text-roxo-300 hover:bg-roxo-700/20 px-4 py-2 rounded-lg text-sm font-medium transition-all">Menu Principal</a>
                <button id="btnSair" class="bg-red-900/60 hover:bg-red-800/80 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all">Sair</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 relative z-10">

        <!-- SEÇÃO: ADICIONAR VÍDEO -->
        <section class="mb-12">
            <div class="bg-preto-700/70 backdrop-blur-sm rounded-2xl bordas-roxas shadow-[0_8px_32px_rgba(0,0,0,0.3)] overflow-hidden">
                <div class="bg-preto-600/50 border-b bordas-roxas px-8 py-5">
                    <h3 class="text-[18px] font-semibold text-roxo-400">CADASTRAR NOVO VÍDEO</h3>
                    <p class="text-gray-400 text-sm mt-1">Preencha os dados para adicionar ao banco de dados</p>
                </div>

                <form id="formVideo" class="p-8 grid md:grid-cols-2 gap-6">
                    <div class="space-y-5">
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-2">Título Completo</label>
                            <input type="text" id="titulo" class="w-full bg-preto-600/60 bordas-roxas rounded-lg px-4 py-3 focus:border-roxo-500 focus:ring-1 focus:ring-roxo-500 outline-none transition-all" placeholder="Título do vídeo" required>
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-2">Categoria</label>
                            <select id="categoria" class="w-full bg-preto-600/60 bordas-roxas rounded-lg px-4 py-3 focus:border-roxo-500 focus:ring-1 focus:ring-roxo-500 outline-none transition-all">
                                <option value="tutoriais">Tutoriais e Dicas</option>
                                <option value="jogos">Jogos e Gameplays</option>
                                <option value="vlogs">Vlogs e Diários</option>
                                <option value="curiosidades">Curiosidades</option>
                                <option value="analises">Análises</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-5">
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-2">Link do YouTube</label>
                            <input type="url" id="link" class="w-full bg-preto-600/60 bordas-roxas rounded-lg px-4 py-3 focus:border-roxo-500 focus:ring-1 focus:ring-roxo-500 outline-none transition-all" placeholder="https://youtube.com/watch?v=..." required>
                            <p class="text-gray-500 text-xs mt-1">Capa carregada automaticamente</p>
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-2">Descrição</label>
                            <textarea id="descricao" rows="3" class="w-full bg-preto-600/60 bordas-roxas rounded-lg px-4 py-3 focus:border-roxo-500 focus:ring-1 focus:ring-roxo-500 outline-none transition-all resize-none" placeholder="Breve descrição..."></textarea>
                        </div>
                    </div>

                    <div class="md:col-span-2 flex justify-center mt-2">
                        <button type="submit" class="bg-gradient-roxo hover:shadow-lg hover:shadow-roxo-800/20 text-white font-semibold px-10 py-3.5 rounded-xl transition-all transform hover:-translate-y-0.5">
                            SALVAR NO BANCO DE DADOS
                        </button>
                    </div>
                </form>
            </div>
        </section>


        <!-- SEÇÃO: VÍDEOS SALVOS -->
        <section>
            <div class="bg-preto-700/70 backdrop-blur-sm rounded-2xl bordas-roxas shadow-[0_8px_32px_rgba(0,0,0,0.3)] overflow-hidden">
                <div class="bg-preto-600/50 border-b bordas-roxas px-8 py-5 flex flex-wrap justify-between items-center gap-4">
                    <div>
                        <h3 class="text-[18px] font-semibold text-roxo-400">VÍDEOS SALVOS NO BANCO</h3>
                        <p class="text-gray-400 text-sm mt-1">Todos os vídeos cadastrados, clique para assistir</p>
                    </div>
                    <div class="flex gap-2">
                        <button class="filtro-btn active bg-roxo-700/40 text-white px-3 py-1.5 rounded text-xs font-medium transition-all" data-filtro="todos">Todos</button>
                        <button class="filtro-btn bg-preto-600/60 text-gray-300 hover:bg-roxo-700/30 px-3 py-1.5 rounded text-xs font-medium transition-all" data-filtro="tutoriais">Tutoriais</button>
                        <button class="filtro-btn bg-preto-600/60 text-gray-300 hover:bg-roxo-700/30 px-3 py-1.5 rounded text-xs font-medium transition-all" data-filtro="jogos">Jogos</button>
                        <button class="filtro-btn bg-preto-600/60 text-gray-300 hover:bg-roxo-700/30 px-3 py-1.5 rounded text-xs font-medium transition-all" data-filtro="vlogs">Vlogs</button>
                        <button class="filtro-btn bg-preto-600/60 text-gray-300 hover:bg-roxo-700/30 px-3 py-1.5 rounded text-xs font-medium transition-all" data-filtro="curiosidades">Curiosidades</button>
                        <button class="filtro-btn bg-preto-600/60 text-gray-300 hover:bg-roxo-700/30 px-3 py-1.5 rounded text-xs font-medium transition-all" data-filtro="analises">Análises</button>
                    </div>
                </div>

                <div class="p-8">
                    <div id="listaVideos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Os vídeos aparecem aqui -->
                        <div class="col-span-full text-center py-10 text-gray-500 italic">Nenhum vídeo cadastrado ainda.</div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // Verifica se está logado
        if (!localStorage.getItem("logado")) {
            window.location.href = "index.html";
        }

        const form = document.getElementById('formVideo');
        const listaContainer = document.getElementById('listaVideos');
        const botoesFiltro = document.querySelectorAll('.filtro-btn');
        let bancoVideos = JSON.parse(localStorage.getItem('videosCadastrados')) || [];


        // Função para pegar a Thumbnail
        function pegarThumbnailDoLink(link) {
            let id = '';
            if (link.includes('youtu.be/')) {
                id = link.split('youtu.be/')[1].split('?')[0];
            } else if (link.includes('youtube.com/watch')) {
                id = new URL(link).searchParams.get('v');
            }
            return id ? `https://img.youtube.com/vi/${id}/mqdefault.jpg` : 'https://via.placeholder.com/320x180/141414/9D4EDD?text=Sem+Capa';
        }


        // Adicionar novo vídeo (CORRIGIDO)
        form.addEventListener('submit', e => {
            e.preventDefault();
            
            const novo = {
                id: Date.now(),
                titulo: document.getElementById('titulo').value,
                categoria: document.getElementById('categoria').value, // <- CORRIGIDO AQUI
                link: document.getElementById('link').value,
                descricao: document.getElementById('descricao').value || "Sem descrição disponível.",
                thumbnail: pegarThumbnailDoLink(document.getElementById('link').value)
            };
            
            bancoVideos.push(novo);
            salvarDados();
            renderizarLista('todos');
            form.reset();
        });


        // Filtrar por categoria (CORRIGIDO)
        botoesFiltro.forEach(btn => {
            btn.addEventListener('click', () => {
                // Reseta estilo de todos
                botoesFiltro.forEach(b => {
                    b.classList.remove('active', 'bg-roxo-700/40', 'text-white');
                    b.classList.add('bg-preto-600/60', 'text-gray-300');
                });
                // Aplica estilo no clicado
                btn.classList.add('active', 'bg-roxo-700/40', 'text-white');
                btn.classList.remove('bg-preto-600/60', 'text-gray-300');
                
                renderizarLista(btn.dataset.filtro);
            });
        });


        // Renderizar lista (CORRIGIDO para exibir corretamente)
        function renderizarLista(filtro) {
            listaContainer.innerHTML = "";
            const listaFiltrada = filtro === "todos" ? bancoVideos : bancoVideos.filter(v => v.categoria === filtro);

            if (listaFiltrada.length === 0) {
                listaContainer.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500 italic">Nenhum vídeo encontrado nessa categoria.</div>`;
                return;
            }

            listaFiltrada.forEach(vid => {
                const card = document.createElement('div');
                card.className = 'bg-preto-600/40 bordas-roxas rounded-lg overflow-hidden hover:border-roxo-400/40 hover:shadow-md hover:shadow-roxo-900/10 transition-all cursor-pointer';
                card.onclick = () => window.open(vid.link, '_blank');

                card.innerHTML = `
                    <div class="w-full h-[140px] overflow-hidden">
                        <img src="${vid.thumbnail}" alt="Capa do vídeo" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                    </div>
                    <div class="p-4">
                        <span class="inline-block px-2 py-0.5 bg-roxo-800/50 text-roxo-300 text-[10px] font-semibold uppercase rounded mb-2">${traduzirCategoria(vid.categoria)}</span>
                        <h4 class="text-sm font-medium text-white line-clamp-2">${vid.titulo}</h4>
                    </div>
                `;
                listaContainer.appendChild(card);
            });
        }


        function traduzirCategoria(cat) {
            const nomes = {
                tutoriais: "Tutoriais", jogos: "Jogos", vlogs: "Vlogs",
                curiosidades: "Curiosidades", analises: "Análises", entretenimento: "Entretenimento"
            };
            return nomes[cat] || cat;
        }

        function salvarDados() {
            localStorage.setItem('videosCadastrados', JSON.stringify(bancoVideos));
        }

        // Logout
        document.getElementById('btnSair').addEventListener('click', () => {
            localStorage.removeItem('logado');
            window.location.href = "index.html";
        });

        // Carrega os vídeos ao abrir a página
        renderizarLista('todos');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Gerenciador de Vídeos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Flores decorativas -->
    <div class="bg-flower flower-top-right"></div>
    <div class="bg-flower flower-bottom-left"></div>
    <div class="bg-flower flower-middle-right"></div>

    <div class="page-wrapper">
        <!-- Barra Superior Fixa -->
        <header class="top-bar">
            <div class="top-bar-content">
                <h2>PAINEL DE GERENCIAMENTO</h2>
                <div class="top-bar-actions">
                    <a href="menu.html" class="btn btn-outline">Menu Principal</a>
                    <a href="index.html" class="btn btn-danger">Sair</a>
                </div>
            </div>
        </header>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            <!-- Seção: Adicionar Vídeo -->
            <section class="card-container">
                <div class="card-header">
                    <h3>📤 Adicionar Novo Vídeo</h3>
                </div>
                <div class="card-body">
                    <form id="novoVideoForm" class="form-grid">
                        <div class="form-col">
                            <div class="form-group">
                                <label>Título do Vídeo</label>
                                <input type="text" id="tituloVid" placeholder="Ex: Como editar vídeos profissionalmente" required>
                            </div>
                            <div class="form-group">
                                <label>Categoria</label>
                                <select id="categoriaVid" required>
                                    <option value="">Selecione uma categoria</option>
                                    <option value="tutoriais">📚 Tutoriais e Dicas</option>
                                    <option value="jogos">🎮 Jogos e Gameplays</option>
                                    <option value="vlogs">🎥 Vlogs e Diários</option>
                                    <option value="curiosidades">💡 Curiosidades e Fatos</option>
                                    <option value="analises">📊 Análises e Avaliações</option>
                                    <option value="entretenimento">🎭 Entretenimento</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-group">
                                <label>Link do YouTube</label>
                                <input type="url" id="linkVid" placeholder="https://www.youtube.com/watch?v=..." required>
                            </div>
                            <div class="form-group">
                                <label>Descrição Curta</label>
                                <textarea id="descricaoVid" rows="3" placeholder="Escreva um pequeno resumo sobre o vídeo..."></textarea>
                            </div>
                        </div>
                        <div class="form-full">
                            <button type="submit" class="btn btn-primary btn-lg">Salvar Vídeo</button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Seção: Visualizar Vídeos -->
            <section class="card-container">
                <div class="card-header">
                    <h3>🎞️ Meus Vídeos Organizados</h3>
                    <div class="filtro-categorias">
                        <button class="btn-filtro active" data-filtro="todos">Todos</button>
                        <button class="btn-filtro" data-filtro="tutoriais">Tutoriais</button>
                        <button class="btn-filtro" data-filtro="jogos">Jogos</button>
                        <button class="btn-filtro" data-filtro="vlogs">Vlogs</button>
                        <button class="btn-filtro" data-filtro="curiosidades">Curiosidades</button>
                        <button class="btn-filtro" data-filtro="analises">Análises</button>
                    </div>
                </div>
                <div class="card-body">
                    <div id="gradeVideos" class="videos-grade">
                        <div class="vazio-msg">Nenhum vídeo cadastrado ainda. Adicione o seu primeiro vídeo acima!</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        if (!localStorage.getItem("logado")) {
            window.location.href = "index.html";
        }

        const form = document.getElementById('novoVideoForm');
        const grade = document.getElementById('gradeVideos');
        const botoesFiltro = document.querySelectorAll('.btn-filtro');
        let bancoVideos = JSON.parse(localStorage.getItem('videosCadastrados')) || [];

        // Adicionar vídeo
        form.addEventListener('submit', e => {
            e.preventDefault();
            const novo = {
                id: Date.now(),
                titulo: document.getElementById('tituloVid').value,
                categoria: document.getElementById('categoriaVid').value,
                link: document.getElementById('linkVid').value,
                descricao: document.getElementById('descricaoVid').value || "Sem descrição disponível."
            };
            bancoVideos.push(novo);
            salvarDados();
            renderizar("todos");
            form.reset();
        });

        // Filtrar
        botoesFiltro.forEach(btn => {
            btn.addEventListener('click', () => {
                botoesFiltro.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderizar(btn.dataset.filtro);
            });
        });

        // Renderizar tela
        function renderizar(filtro) {
            grade.innerHTML = "";
            const listaFiltrada = filtro === "todos" ? bancoVideos : bancoVideos.filter(v => v.categoria === filtro);

            if (listaFiltrada.length === 0) {
                grade.innerHTML = `<div class="vazio-msg">Nenhum vídeo encontrado nessa categoria.</div>`;
                return;
            }

            listaFiltrada.forEach(vid => {
                const card = document.createElement('div');
                card.className = 'video-card-item';
                card.innerHTML = `
                    <div class="card-categoria-tag cat-${vid.categoria}">${traduzirCategoria(vid.categoria)}</div>
                    <h4 class="card-titulo">${vid.titulo}</h4>
                    <p class="card-desc">${vid.descricao}</p>
                    <a href="${vid.link}" target="_blank" class="btn btn-primary btn-sm">Assistir no YouTube</a>
                `;
                grade.appendChild(card);
            });
        }

        function traduzirCategoria(cat) {
            const nomes = {
                tutoriais: "Tutoriais", jogos: "Jogos", vlogs: "Vlogs",
                curiosidades: "Curiosidades", analises: "Análises", entretenimento: "Entretenimento"
            };
            return nomes[cat] || cat;
        }

        function salvarDados() {
            localStorage.setItem('videosCadastrados', JSON.stringify(bancoVideos));
        }

        // Inicializar
        renderizar("todos");
    </script>
</body>
</html>
